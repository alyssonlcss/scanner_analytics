name: Release Automation

on:
  push:
    tags:
      - 'v*' # Dispara quando uma tag começando com 'v' for criada (ex: v1.1.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão necessária para criar a Release no GitHub
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Notas da Release do CHANGELOG.md
        id: extract_release_notes
        run: |
          cat << 'EOF' > extract.js
          const fs = require('fs');
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          console.log('Buscando versão ' + version + ' no CHANGELOG.md...');
          const content = fs.readFileSync('CHANGELOG.md', 'utf8').replace(/\r\n/g, '\n');
          const lines = content.split('\n');
          let capturing = false;
          let notes = [];
          for (let line of lines) {
            if (line.startsWith('## [')) {
              if (line.includes('[' + version + ']')) {
                capturing = true;
                continue;
              } else if (capturing) {
                break;
              }
            }
            if (capturing) {
              notes.push(line);
            }
          }
          const finalNotes = notes.join('\n').trim();
          if (finalNotes) {
            fs.writeFileSync('release_notes.txt', finalNotes);
            console.log('Conteúdo extraído com sucesso!');
          } else {
            fs.writeFileSync('release_notes.txt', 'Notas não encontradas no CHANGELOG.md');
            console.log('Nenhuma nota encontrada.');
          }
          EOF
          node extract.js
          
          echo "Conteúdo extraído com sucesso!"

      - name: Criar ou Atualizar Release no GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tenta criar a release do zero. Se ela já existir (ou foi re-taggada), a criação falha e o script executa o edit para forçar a sobrescrita do texto!
          gh release create ${{ github.ref_name }} --notes-file release_notes.txt || gh release edit ${{ github.ref_name }} --notes-file release_notes.txt
